services:
  server:
    build:
      context: ../..
      dockerfile: packages/server/Dockerfile
    container_name: gantt-server
    restart: unless-stopped
    env_file:
      - ../../.env
    ports:
      - "3000:3000"
    extra_hosts:
      # Allow reaching host-network Postgres/MinIO from inside the container if needed.
      - "host.docker.internal:host-gateway"
