name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Pull latest code
        run: |
          cd /root/repo/gantt-chart-app
          git fetch --prune origin
          git reset --hard origin/main

      - name: Run deploy script
        run: bash /root/repo/gantt-chart-app/deploy-all.sh
